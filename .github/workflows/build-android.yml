name: Build Android Debug
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: |
          node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
        restore-keys: ${{ runner.os }}-node-

    - name: Initialize React Native project (if android/ missing)
      run: |
        if [ ! -d "android" ]; then
          echo "android/ not found, initializing React Native project..."
          # npx react-native init creates a directory with the given name
          npx react-native@0.74.x init SmartCalendar --skip-install
          echo "Init done. Listing generated files..."
          ls -la SmartCalendar/

          echo "Copying android/ to repo root..."
          cp -r SmartCalendar/android ./

          echo "Copying ios/ to repo root (if exists)..."
          [ -d "SmartCalendar/ios" ] && cp -r SmartCalendar/ios ./ || echo "No ios/ directory, skipping."

          echo "Copying config files..."
          [ -f "SmartCalendar/app.json" ] && cp SmartCalendar/app.json ./
          [ -f "SmartCalendar/index.js" ] && cp SmartCalendar/index.js ./
          [ -f "SmartCalendar/babel.config.js" ] && cp SmartCalendar/babel.config.js ./

          echo "Cleaning up temp directory..."
          rm -rf SmartCalendar

          echo "android/ directory created successfully"
          ls -la android/
        else
          echo "android/ directory already exists, skipping init."
        fi

    - name: Install dependencies
      run: npm install

    - name: Build debug APK
      run: cd android && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: smartcalendar-debug-${{ github.sha }}
        path: android/app/build/outputs/apk/debug/app-debug.apk
