name: Build Android Debug
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize React Native project (if android/ missing)
      run: |
        if [ ! -d "android" ]; then
          echo "android/ not found, initializing React Native project..."
          npx react-native@0.74.x init SmartCalendar --skip-install --pm npm
          echo "Copying android/ and ios/ (if any) to repo root..."
          cp -r SmartCalendar/android ./
          cp -r SmartCalendar/ios ./ 2>/dev/null || true
          cp SmartCalendar/app.json ./
          cp SmartCalendar/index.js ./
          cp SmartCalendar/babel.config.js ./
          rm -rf SmartCalendar
          echo "android/ directory created successfully"
          ls -la android/
        else
          echo "android/ directory already exists, skipping init."
        fi

    - name: Install dependencies
      run: npm install

    - name: Build debug APK
      run: cd android && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: smartcalendar-debug-${{ github.sha }}
        path: android/app/build/outputs/apk/debug/app-debug.apk
