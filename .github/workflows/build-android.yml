name: Build Android Debug

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Generate android project (if missing)
        if: ${{ !hashFiles('android/build.gradle') }}
        run: |
          echo "android/ not found, extracting from react-native package..."
          cd /tmp

          # Download react-native package tarball
          PACKAGE_URL=$(npm view react-native@0.74.7 dist.tarball)
          echo "Downloading: $PACKAGE_URL"
          curl -L -o react-native.tgz "$PACKAGE_URL" 2>&1

          # Extract and find android/ template
          tar -xzf react-native.tgz
          if [ -d "package/template/android" ]; then
            cp -r package/template/android "${{ github.workspace }}/android"
            echo "android/ extracted from react-native package"
            ls -la "${{ github.workspace }}/android/"
          else
            echo "ERROR: android/ not found in package template"
            ls -la package/template/ 2>/dev/null || echo "template/ not found"
            ls -la package/ 2>/dev/null || echo "package/ not found"
            exit 1
          fi
          rm -rf react-native.tgz package

      - name: Verify android directory
        run: |
          if [ ! -f "android/build.gradle" ]; then
            echo "ERROR: android/build.gradle not found"
            exit 1
          fi
          echo "android/ ready"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartcalendar-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
