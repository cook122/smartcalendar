name: Build Android Debug

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npx jest --ci --no-cache --verbose

      - name: Generate android project (if missing)
        if: ${{ !hashFiles('android/build.gradle') }}
        run: |
          echo "android/ not found, extracting from react-native package..."
          cd /tmp
          PACKAGE_URL=$(npm view react-native@0.74.7 dist.tarball)
          curl -L -o react-native.tgz "$PACKAGE_URL" 2>&1
          tar -xzf react-native.tgz
          if [ -d "package/template/android" ]; then
            cp -r package/template/android "${{ github.workspace }}/android"
            echo "android/ extracted from react-native package"
          else
            echo "ERROR: android/ not found in package template"
            exit 1
          fi
          rm -rf react-native.tgz package

      - name: Verify android directory
        run: |
          if [ ! -f "android/build.gradle" ]; then
            echo "ERROR: android/build.gradle not found"
            exit 1
          fi

      - name: Add ABI splits config
        run: |
          cat > add_splits.js << 'SCRIPT'
          const fs = require('fs');
          let c = fs.readFileSync('android/app/build.gradle', 'utf8');
          if (!c.includes('splits')) {
            c = c.replace(/(\n\s+buildTypes\s*\{)/, '\n    splits {\n        abi {\n            enable true\n            reset()\n            include "arm64-v8a"\n            universalApk true\n        }\n    }\n$1');
            fs.writeFileSync('android/app/build.gradle', c);
            console.log('ABI splits added');
          }
          SCRIPT
          node add_splits.js

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: List APK files
        run: |
          echo "APK files generated:"
          find android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartcalendar-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/**/*.apk
