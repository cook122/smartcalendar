name: Build Android Debug

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Generate android project (if missing)
        if: ${{ !hashFiles('android/build.gradle') }}
        run: |
          echo "android/ not found, generating via react-native init..."
          cd /tmp
          # Use --skip-install to skip iOS pod install (faster and avoids iOS-only failures)
          npx --yes react-native@0.74.7 init TempApp --skip-install 2>&1
          echo "--- TempApp contents ---"
          ls -la /tmp/TempApp/ 2>/dev/null || echo "TempApp dir not found"
          echo "--- /tmp contents ---"
          ls -la /tmp/ | head -20

          if [ -d "/tmp/TempApp/android" ]; then
            echo "Copying android/ to workspace..."
            cp -r /tmp/TempApp/android "${{ github.workspace }}/android"
            rm -rf /tmp/TempApp
            echo "android/ copied successfully"
          else
            echo "ERROR: android/ not found in TempApp"
            exit 1
          fi

      - name: Verify android directory
        run: |
          if [ ! -f "android/build.gradle" ]; then
            echo "ERROR: android/build.gradle not found"
            ls -la android/ 2>/dev/null || echo "android/ dir missing"
            exit 1
          fi
          echo "android/ directory ready"
          ls -la android/

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartcalendar-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
